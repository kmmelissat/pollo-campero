apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-replica
  namespace: pollos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-replica
  template:
    metadata:
      labels:
        app: postgres-replica
    spec:
      containers:
        - name: postgres-replica
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "pollos"
            - name: POSTGRES_PASSWORD
              value: "pollos"
            - name: POSTGRES_DB
              value: "orders"