services:
  postgres-primary:
    image: postgres:16-alpine
    container_name: pollos-postgres-primary
    environment:
      POSTGRES_USER: pollos
      POSTGRES_PASSWORD: pollos
      POSTGRES_DB: orders
    ports:
      - "5432:5432"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pollos -d orders"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-replica:
    image: postgres:16-alpine
    container_name: pollos-postgres-replica
    environment:
      POSTGRES_USER: pollos
      POSTGRES_PASSWORD: pollos
      POSTGRES_DB: orders
    ports:
      - "5433:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pollos -d orders"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: pollos-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  menu-service:
    build:
      context: ..
      dockerfile: menu-service/Dockerfile
    container_name: pollos-menu-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:3001/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  order-service:
    build:
      context: ..
      dockerfile: order-service/Dockerfile
    container_name: pollos-order-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      NODE_ENV: production
      MENU_SERVICE_URL: http://menu-service:3001
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      WRITE_DB_URL: postgresql://pollos:pollos@postgres-primary:5432/orders
      READ_DB_URL: postgresql://pollos:pollos@postgres-replica:5432/orders
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      menu-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:3002/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  notification-service:
    build:
      context: ..
      dockerfile: notification-service/Dockerfile
    container_name: pollos-notification-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      NODE_ENV: production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:3003/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_primary_data:
  postgres_replica_data:
